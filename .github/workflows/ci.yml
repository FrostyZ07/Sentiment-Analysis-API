name: CI — Lint, Test, Docker Smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('requirements-dev.txt') }}

      - name: Install linters
        run: pip install ruff==0.4.4 black==24.4.2 isort==5.13.2

      - name: Run ruff
        run: ruff check app/ tests/

      - name: Run black
        run: black --check app/ tests/

      - name: Run isort
        run: isort --check-only app/ tests/

  # ── Job 2: Test ────────────────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Docker Build Smoke Test ────────────────────────────────
  docker-build:
    name: Docker Build + Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: sentiment-api:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker smoke test
        run: |
          docker run -d \
            --name smoke-test \
            -p 8000:8000 \
            -e MODEL_PATH=/app/models/distilbert-sentiment \
            sentiment-api:ci-test

          # Wait for container to start (up to 30s)
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Health check passed"
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done

          # Assert health returns 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned $STATUS"
            docker logs smoke-test
            exit 1
          fi

          docker stop smoke-test
